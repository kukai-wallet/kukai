<div class="list-item" (click)="openModal()">
  <div class="imgWrapper"><img [src]="getTokenImg"></div>
  <span>{{ listDisplayText() }}</span>
</div>

<!-- Modal -->
<div *ngIf="modalOpen" id="myModal" class="kukai-modal">
  <div class="km-content">
    <div class="x" (click)="closeModal()"><img src="../../../assets/img/x.svg"></div>
    <div class="km-header">
      <H1>Token Info</H1>
    </div>
    <div class="km-body">
      <div class="top-wrapper">
        <div class="basics">
          <div class="group">
            <label>Name</label>
            <p>{{ token.name }}</p>
          </div>
          <div class="group">
            <label>Symbol</label>
            <p style="margin-bottom: 0">{{ token.symbol }}</p>
          </div>
        </div>

        <div class="badge-item">
          <span *ngIf="!isTrusted" class="badge-notify">&#x21;</span>
          <img [src]="getTokenImg">
        </div>

      </div>
      <div class="group">
        <label>Description</label>
        <p>{{ getDescription() }}</p>
      </div>
      <div *ngIf="token.contractAddress" class="group">
        <label>Contract Address</label>
        <p>{{ token.contractAddress }}&nbsp;<span style="font-weight: lighter;">(#{{ token.id }})</span></p>
      </div>
      <div class="row-group" style="margin: 1.25rem 0 0.5rem 0;">
        <button class="purple confirm" (click)="onTrust(true)">Approve</button>
        <button class="confirm" style="background-color: rgb(214, 89, 89);color: white;" (click)="onTrust(false)">Reject</button>
      </div>

    </div>
  </div>
</div>
